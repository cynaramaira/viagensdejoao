<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giro de João Campos - Pernambuco 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --jamildo-orange: #f83d03;
            --jamildo-blue: #024796;
            --bg-light: #f9f9f9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #infographic-container {
            width: 500px;
            height: 600px;
            position: relative;
            background: #fff;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            user-select: none;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 10px;
            border-bottom: 2px solid var(--jamildo-orange);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header img {
            height: 40px;
        }

        /* Área do Mapa */
        #map-area {
            flex-grow: 1;
            position: relative;
            background: #f0f4f8;
            overflow: hidden;
        }

        /* CONTAINER PARA O SVG EXTERNO */
        #svg-map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Representação do João Campos */
        #joao-avatar {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--jamildo-orange);
            background-image: url('joao-campos.jpg');
            background-size: cover;
            background-position: center;
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #ccc;
        }

        /* Aviãozinho decorativo */
        #joao-avatar::after {
            content: '✈️';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 20px;
            background: white;
            border-radius: 50%;
            padding: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Card de Informação */
        #info-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(2, 71, 150, 0.95);
            color: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid var(--jamildo-orange);
            z-index: 20;
            transition: opacity 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .date-label {
            font-weight: bold;
            color: var(--jamildo-orange);
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 3px;
        }

        .location-label {
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .details-text {
            font-size: 0.85rem;
            line-height: 1.3;
        }

        /* Controles Inferiores */
        .controls {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn {
            background: var(--jamildo-blue);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: var(--jamildo-orange);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        input[type=range] {
            flex-grow: 1;
            accent-color: var(--jamildo-orange);
            cursor: pointer;
        }

        /* Marcadores das cidades */
        .city-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--jamildo-blue);
            border: 1.5px solid white;
            border-radius: 50%;
            z-index: 5;
            transform: translate(-50%, -50%);
            opacity: 0.6;
        }

        /* Estilos dinâmicos para destacar a cidade atual no SVG */
        #svg-map-container path, #svg-map-container g {
            transition: fill 0.3s ease, stroke-width 0.3s ease;
        }
        #svg-map-container path.active,
        #svg-map-container g.active path {
            fill: var(--jamildo-orange) !important;
            stroke: var(--jamildo-blue) !important;
            stroke-width: 2.5px !important;
            stroke-opacity: 1 !important;
        }
    </style>
</head>

    // Pega o centro exato da cidade renderizada usando GetBoundingClientRect
    function getCoords(svgId) {
        if (svgId === 'exterior') {
            // Joga o avatar para fora da tela (simulando viagem internacional)
            return { x: 150, y: -50 };
        }

        const pathElement = document.getElementById(svgId);
        if (!pathElement) {
            console.warn("Cidade não encontrada no SVG: " + svgId);
            return { x: 50, y: 50 }; // Fallback para o centro do mapa
        }
        
        const rect = pathElement.getBoundingClientRect();
        const mapRect = document.getElementById('map-area').getBoundingClientRect();
        
        return {
            x: ((rect.left + (rect.width / 2) - mapRect.left) / mapRect.width) * 100,
            y: ((rect.top + (rect.height / 2) - mapRect.top) / mapRect.height) * 100
        };
    }

                    dots[index].style.display = 'block';
                    dots[index].style.left = coords.x + '%';
                    dots[index].style.top = coords.y + '%';
                }
            }
        });
    }

    // Cria os pontos de referência no mapa
    function initMarkers() {
        itinerary.forEach(() => {
            const dot = document.createElement('div');
            dot.className = 'city-dot';
            markersContainer.appendChild(dot);
        });
        updateDots();
    }

    function updateUI() {
        const item = itinerary[currentIndex];
        
        // Remove o destaque de todas as cidades no SVG e destaca a atual
        document.querySelectorAll('#svg-map-container .active').forEach(el => el.classList.remove('active'));
        const activePath = document.getElementById(item.svgId);
        if (activePath) activePath.classList.add('active');

        // Calcula as coordenadas atuais da cidade e movimenta o avatar
        const coords = getCoords(item.svgId);
        avatar.style.left = coords.x + '%';
        avatar.style.top = coords.y + '%';

        // Atualiza as informações do card
        infoCard.style.opacity = '0';
        
        setTimeout(() => {
            cardDate.innerText = item.date + " de 2026";
            cardLocation.innerText = item.location + " (" + item.region + ")";
            cardDetails.innerText = item.details;
            infoCard.style.opacity = '1';
        }, 150);

        // Ajusta o estado dos controles
        dateRange.value = currentIndex;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === itinerary.length - 1;
    }

    // Navegação via botões
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < itinerary.length - 1) {
            currentIndex++;
            updateUI();
        }
    });

    // Navegação via barra de progresso
    dateRange.addEventListener('input', (e) => {
        currentIndex = parseInt(e.target.value);
        updateUI();
    });

    // Navegação via teclado (setas esquerda/direita)
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft" && currentIndex > 0) {
            currentIndex--;
            updateUI();
        } else if (e.key === "ArrowRight" && currentIndex < itinerary.length - 1) {
            currentIndex++;
            updateUI();
        }
    });

    // Recalcula posições ao redimensionar a tela para que os pontos não saiam da cidade correta
    window.addEventListener('resize', () => {
        updateDots();
        const coords = getCoords(itinerary[currentIndex].svgId);
        avatar.style.left = coords.x + '%';
        avatar.style.top = coords.y + '%';
    });

    // Início da aplicação
    window.onload = () => {
        dateRange.max = itinerary.length - 1;
        initMarkers();
        updateUI();
    };

</script>

</body>
</html>
